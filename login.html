<!DOCTYPE html>
<html>
<head>
  <title>Login - SAZIO</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 220px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 12px 24px;
      background: #ff4d4d;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Login 🔐</h1>

  <input id="username" type="text" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <script>
    function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (username === "admin" && password === "12345") {
        alert("Login Successful ✅");
        window.location.href = "index.html";
      } else {
        alert("Wrong Username or Password ❌");
      }
    }
  </script>

</body>
</html>
