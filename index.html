<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAZIO X MASTER - Phase 2</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#000;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
      padding:20px;
    }
    .card{
      background:#111;
      padding:30px;
      border-radius:20px;
      width:320px;
      text-align:center;
      box-sizing:border-box;
    }
    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      box-sizing:border-box;
    }
    button{
      margin-top:15px;
      padding:12px;
      width:48%;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }
    .signup{background:#ff5c5c;color:#fff;}
    .login{background:#333;color:#fff;}
    .logout{
      background:#eee;
      color:#111;
      width:100%;
      margin-top:20px;
    }
    .output{
      margin-top:15px;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
    }
    #dashboard{
      display:none;
      text-align:center;
      color:#fff;
      width:320px;
    }
    #dashboard h2{
      font-size:28px;
      margin-bottom:10px;
    }
    #dashboard p{
      font-size:15px;
      margin:10px 0;
      line-height:1.6;
    }
  </style>
</head>
<body>

  <div class="card" id="authCard">
    <h2>SAZIO LOGIN</h2>

    <input id="authName" type="text" placeholder="Full Name">
    <input id="authEmail" type="email" placeholder="Email">
    <input id="authPassword" type="password" placeholder="Password">

    <div>
      <button class="signup" onclick="signup()">Signup</button>
      <button class="login" onclick="login()">Login</button>
    </div>

    <div class="output" id="authOutput">Ready...</div>
  </div>

  <div id="dashboard">
    <h2>Welcome Dashboard 🚀</h2>
    <p id="userName"></p>
    <p id="userEmail"></p>
    <p id="userUid"></p>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    function showDashboard(user, profileData = null){
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('authCard').style.display = 'none';

      const finalName =
        profileData?.name ||
        user.displayName ||
        "Not set";

      document.getElementById('userName').textContent = "Name: " + finalName;
      document.getElementById('userEmail').textContent = "Email: " + user.email;
      document.getElementById('userUid').textContent = "UID: " + user.uid;
    }

    function showLogin(){
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('authCard').style.display = 'block';
    }

    async function loadUserProfile(user){
      try {
        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);

        if (snap.exists()) {
          showDashboard(user, snap.data());
        } else {
          showDashboard(user, null);
        }
      } catch (error) {
        document.getElementById('authOutput').textContent = error.message;
        showDashboard(user, null);
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await loadUserProfile(user);
      } else {
        showLogin();
      }
    });

    window.signup = async () => {
      const name = document.getElementById('authName').value.trim();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();

      if(!name || !email || !password){
        document.getElementById('authOutput').textContent = "Fill all fields";
        return;
      }

      try {
        document.getElementById('authOutput').textContent = "Signing up...";
        const userCred = await createUserWithEmailAndPassword(auth, email, password);

        await updateProfile(userCred.user, {
          displayName: name
        });

        await setDoc(doc(db, "users", userCred.user.uid), {
          name: name,
          email: email,
          uid: userCred.user.uid,
          createdAt: new Date().toISOString()
        });

        document.getElementById('authOutput').textContent = "Signup successful ✅";
      } catch (error) {
        document.getElementById('authOutput').textContent = error.message;
      }
    };

    window.login = async () => {
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();

      if(!email || !password){
        document.getElementById('authOutput').textContent = "Fill email & password";
        return;
      }

      try {
        document.getElementById('authOutput').textContent = "Logging in...";
        await signInWithEmailAndPassword(auth, email, password);
        document.getElementById('authOutput').textContent = "Login successful 🚀";
      } catch (error) {
        document.getElementById('authOutput').textContent = error.message;
      }
    };

    window.logout = async () => {
      try {
        await signOut(auth);
        document.getElementById('authOutput').textContent = "Logged out ✅";
      } catch (error) {
        document.getElementById('authOutput').textContent = error.message;
      }
    };
  </script>

</body>
</html>
