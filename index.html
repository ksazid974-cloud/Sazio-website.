<!DOCTYPE html>
<html>
<head>
  <title>SAZIO FINAL</title>
</head>
<body style="background:black;color:white;font-family:sans-serif;text-align:center;">

<h1>🚀 SAZIO FINAL SYSTEM</h1>

<input id="email" placeholder="Email"><br><br>
<input id="password" placeholder="Password" type="password"><br><br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<h2 id="user"></h2>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAsCSXhw4939IEx379MDiXl9C",
  authDomain: "sazio-1.firebaseapp.com",
  projectId: "sazio-1",
  storageBucket: "sazio-1.appspot.com",
  messagingSenderId: "82743199739",
  appId: "1:82743199739:web:952840299f517d1e47ed5e",
  measurementId: "G-94DZEMDQ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const user = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db, "users", user.user.uid), {
    email: email,
    earnings: 0,
    clicks: 0
  });

  alert("Signup success 🚀");
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const user = await signInWithEmailAndPassword(auth, email, password);

  document.getElementById("user").innerText = "Logged in: " + user.user.email;
};
</script>

</body>
</html>
