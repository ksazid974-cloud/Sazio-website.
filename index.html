<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SAZIO FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black;color:white;font-family:Arial;text-align:center;">

<h1>🚀 SAZIO FINAL SYSTEM</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">
<h2 id="userEmail"></h2>

<h2>Clicks: <span id="clicks">0</span></h2>
<button onclick="addClick()">Add Click</button>

<h2>Earnings: $<span id="earnings">0</span></h2>
<button onclick="addMoney()">Add $5</button>

<h3>Referral Code:</h3>
<p id="refCode"></p>

<h3>Referral Link:</h3>
<p id="refLink"></p>

<h3>Referrals:</h3>
<p id="refCount">0</p>

<button onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAsCSXhw4939IEx379MDiXl9CTVJjvJLEI",
authDomain: "sazio-1.firebaseapp.com",
projectId: "sazio-1",
storageBucket: "sazio-1.firebasestorage.app",
messagingSenderId: "82743199739",
appId: "1:82743199739:web:952840299f517d1e47ed5e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function makeCode(uid){
return "SAZ" + uid.slice(0,6).toUpperCase();
}

async function createUserDoc(user){
const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
email:user.email,
clicks:0,
earnings:0,
referrals:0,
refCode:makeCode(user.uid),
referredBy:null
});
}
return ref;
}

async function handleReferral(user){
const url = new URL(window.location.href);
const code = url.searchParams.get("ref");
if(!code) return;

const myRef = doc(db,"users",user.uid);
const mySnap = await getDoc(myRef);
if(mySnap.data()?.referredBy) return;

const q = query(collection(db,"users"), where("refCode","==",code));
const res = await getDocs(q);

if(res.empty) return;

const refUser = res.docs[0];

await updateDoc(doc(db,"users",refUser.id),{
referrals: increment(1),
earnings: increment(10)
});

await updateDoc(myRef,{
referredBy: code
});
}

onAuthStateChanged(auth, async (user)=>{
if(!user){
document.getElementById("loginBox").style.display="block";
document.getElementById("dashboard").style.display="none";
return;
}

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("userEmail").innerText=user.email;

const ref = await createUserDoc(user);
await handleReferral(user);

const data = (await getDoc(ref)).data();

document.getElementById("clicks").innerText=data.clicks;
document.getElementById("earnings").innerText=data.earnings;
document.getElementById("refCount").innerText=data.referrals;

document.getElementById("refCode").innerText=data.refCode;
document.getElementById("refLink").innerText=window.location.origin+"?ref="+data.refCode;
});

window.signup = async ()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login = async ()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = async ()=>{
await signOut(auth);
};

window.addClick = async ()=>{
const user=auth.currentUser;
const ref=doc(db,"users",user.uid);
await updateDoc(ref,{clicks:increment(1)});
location.reload();
};

window.addMoney = async ()=>{
const user=auth.currentUser;
const ref=doc(db,"users",user.uid);
await updateDoc(ref,{earnings:increment(5)});
location.reload();
};

</script>

</body>
</html>
