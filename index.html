<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAZIO FINAL SYSTEM</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      line-height: 1.1;
      margin: 30px 0 24px;
      font-weight: 800;
    }

    .box,
    .card {
      width: 100%;
      max-width: 650px;
      margin: 20px auto;
      background: #0f0f0f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 28px 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    input {
      width: 100%;
      max-width: 540px;
      padding: 18px 16px;
      margin: 12px 0;
      border: none;
      border-radius: 18px;
      font-size: 18px;
      outline: none;
    }

    button {
      padding: 16px 28px;
      margin: 10px 8px;
      border: none;
      border-radius: 18px;
      background: #ff5757;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .small-btn {
      min-width: 180px;
    }

    #msg {
      margin-top: 18px;
      color: #ffd166;
      font-size: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    #dashboard {
      display: none;
      max-width: 700px;
      margin: 0 auto;
    }

    .value {
      font-size: 56px;
      font-weight: 800;
      color: #ff5b5b;
      margin: 18px 0 8px;
    }

    .label {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .userline {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      word-break: break-word;
    }

    #aiOutput {
      font-size: 18px;
      line-height: 1.6;
      color: #f1f1f1;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 34px;
      }

      .value {
        font-size: 44px;
      }

      input,
      button {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>

  <h1>🚀 SAZIO<br>FINAL SYSTEM</h1>

  <div class="box" id="authBox">
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <div>
      <button class="small-btn" onclick="signup()">Signup</button>
      <button class="small-btn" onclick="login()">Login</button>
    </div>

    <div id="msg"></div>
  </div>

  <div id="dashboard">
    <div class="card">
      <div class="userline" id="userText">Logged in</div>
      <button class="small-btn" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <div class="label">Total Clicks</div>
      <div class="value" id="clicks">0</div>
      <button class="small-btn" onclick="addClick()">Add Click</button>
    </div>

    <div class="card">
      <div class="label">Estimated Earnings</div>
      <div class="value" id="earnings">$0</div>
      <button class="small-btn" onclick="addMoney()">Add $5</button>
    </div>

    <div class="card">
      <div class="label">AI Idea Generator</div>
      <button class="small-btn" onclick="generateAI()">Generate Idea</button>
      <div id="aiOutput">AI output yahan dikhega.</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAsCSXhw4939IEx379MDiXl9CTVJjvJLEI",
      authDomain: "sazio-1.firebaseapp.com",
      projectId: "sazio-1",
      storageBucket: "sazio-1.appspot.com",
      messagingSenderId: "82743199739",
      appId: "1:82743199739:web:952840299f517d1e47ed5e",
      measurementId: "G-94DZEMDQX6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authBox = document.getElementById("authBox");
    const dashboard = document.getElementById("dashboard");
    const msg = document.getElementById("msg");
    const userText = document.getElementById("userText");
    const clicksEl = document.getElementById("clicks");
    const earningsEl = document.getElementById("earnings");
    const aiOutput = document.getElementById("aiOutput");

    function showMsg(text) {
      msg.innerText = text;
    }

    function prettyError(err) {
      const code = err?.code || "";

      if (code.includes("auth/email-already-in-use")) return "Ye email pehle se registered hai. Login karo.";
      if (code.includes("auth/invalid-email")) return "Email sahi format me likho.";
      if (code.includes("auth/weak-password")) return "Password kam se kam 6 characters ka hona chahiye.";
      if (code.includes("auth/invalid-credential")) return "Email ya password galat hai.";
      if (code.includes("auth/user-not-found")) return "User nahi mila. Pehle signup karo.";
      if (code.includes("auth/network-request-failed")) return "Internet ya network issue hai.";
      return err?.message || "Kuch error aaya hai.";
    }

    async function loadUserData(user) {
      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);

      if (!snap.exists()) {
        await setDoc(userRef, {
          email: user.email,
          clicks: 0,
          earnings: 0,
          createdAt: Date.now()
        });
      }

      const finalSnap = await getDoc(userRef);
      const data = finalSnap.data();

      userText.innerText = "Logged in: " + user.email;
      clicksEl.innerText = data.clicks ?? 0;
      earningsEl.innerText = "$" + (data.earnings ?? 0);

      authBox.style.display = "none";
      dashboard.style.display = "block";
    }

    window.signup = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        showMsg("Email aur password dono bharo.");
        return;
      }

      try {
        showMsg("Signup ho raha hai...");
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
          email: user.email,
          clicks: 0,
          earnings: 0,
          createdAt: Date.now()
        });

        showMsg("Signup successful ✅ Ab login bhi ho gaya hai.");
      } catch (err) {
        showMsg(prettyError(err));
      }
    };

    window.login = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        showMsg("Email aur password dono bharo.");
        return;
      }

      try {
        showMsg("Login ho raha hai...");
        await signInWithEmailAndPassword(auth, email, password);
        showMsg("Login successful ✅");
      } catch (err) {
        showMsg(prettyError(err));
      }
    };

    window.logout = async function () {
      await signOut(auth);
      location.reload();
    };

    window.addClick = async function () {
      const user = auth.currentUser;
      if (!user) return;

      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);
      const currentClicks = snap.data()?.clicks ?? 0;
      const newClicks = currentClicks + 1;

      await updateDoc(userRef, { clicks: newClicks });
      clicksEl.innerText = newClicks;
    };

    window.addMoney = async function () {
      const user = auth.currentUser;
      if (!user) return;

      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);
      const currentEarnings = snap.data()?.earnings ?? 0;
      const newEarnings = currentEarnings + 5;

      await updateDoc(userRef, { earnings: newEarnings });
      earningsEl.innerText = "$" + newEarnings;
    };

    window.generateAI = function () {
      const ideas = [
        "Strong hook: first 2 seconds me sudden danger dikhao.",
        "Story idea: struggle → twist → emotional reward ending.",
        "Growth idea: viral title + thumbnail contrast + pinned comment.",
        "Monetization idea: shorts + affiliate + CTA combo.",
        "Retention idea: start with shock, then reveal emotional reason."
      ];
      const pick = ideas[Math.floor(Math.random() * ideas.length)];
      aiOutput.innerText = pick;
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await loadUserData(user);
      } else {
        authBox.style.display = "block";
        dashboard.style.display = "none";
      }
    });
  </script>
</body>
</html>
