<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sazio AI Login</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 390px;
      background: #111;
      border-radius: 22px;
      padding: 24px 18px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255,255,255,0.04);
    }

    .brand {
      font-size: 13px;
      color: #bdbdbd;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.35;
    }

    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      margin-top: 12px;
      font-size: 15px;
      outline: none;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .signup { background: #ff5c5c; color: #fff; }
    .login { background: #333; color: #fff; }

    .box {
      background: #181818;
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      Sazio — The Fastest & Most Powerful AI to Create, Grow & Earn 🚀
    </div>

    <h1>Welcome to Sazio AI</h1>

    <input id="name" type="text" placeholder="Full Name" />
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <div class="btn-row">
      <button class="signup" onclick="signup()">Signup</button>
      <button class="login" onclick="login()">Login</button>
    </div>

    <div class="box" id="statusBox">Ready...</div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      onAuthStateChanged,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      updateProfile,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const statusBox = document.getElementById("statusBox");

    function setStatus(text) {
      statusBox.innerText = text;
    }

    async function enablePersistence() {
      await setPersistence(auth, browserLocalPersistence);
    }

    function getSavedRef() {
      const params = new URLSearchParams(window.location.search);
      const ref = params.get("ref");

      if (ref) {
        localStorage.setItem("sazio_ref", ref);
        return ref;
      }

      return localStorage.getItem("sazio_ref");
    }

    function makeDashboardUrl() {
      const savedRef = getSavedRef();

      if (savedRef) {
        return "./dashboard.html?ref=" + encodeURIComponent(savedRef) + "&v=" + Date.now();
      }

      return "./dashboard.html?v=" + Date.now();
    }

    async function ensureUserDoc(user, fallbackName = "Sazio") {
      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);

      if (!snap.exists()) {
        await setDoc(userRef, {
          name: user.displayName || fallbackName,
          email: user.email || "",
          uid: user.uid,
          clicks: 0,
          earnings: 0,
          streak: 0,
          subscription: "Free",
          createdAt: new Date().toISOString()
        });
        return;
      }

      const data = snap.data();
      if (!data.name) {
        await setDoc(userRef, {
          ...data,
          name: user.displayName || fallbackName
        });
      }
    }

    window.signup = async () => {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !email || !password) {
        setStatus("Please fill all fields.");
        return;
      }

      try {
        setStatus("Creating account...");
        await enablePersistence();
        getSavedRef();

        const cred = await createUserWithEmailAndPassword(auth, email, password);

        await updateProfile(cred.user, {
          displayName: name
        });

        await setDoc(doc(db, "users", cred.user.uid), {
          name,
          email,
          uid: cred.user.uid,
          clicks: 0,
          earnings: 0,
          streak: 0,
          subscription: "Free",
          createdAt: new Date().toISOString()
        });

        setStatus("Signup successful. Redirecting...");
        window.location.href = makeDashboardUrl();
      } catch (error) {
        setStatus(error.message);
      }
    };

    window.login = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setStatus("Please enter email and password.");
        return;
      }

      try {
        setStatus("Logging in...");
        await enablePersistence();
        getSavedRef();

        const cred = await signInWithEmailAndPassword(auth, email, password);
        await ensureUserDoc(cred.user);

        setStatus("Login successful. Redirecting...");
        window.location.href = makeDashboardUrl();
      } catch (error) {
        setStatus(error.message);
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await enablePersistence();
        window.location.href = makeDashboardUrl();
      } else {
        getSavedRef();
        setStatus("Ready...");
      }
    });
  </script>
</body>
</html>
