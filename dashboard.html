<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazio Final Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
text-align:center;
}

.card{
padding:20px;
}

button{
width:90%;
padding:14px;
border:none;
border-radius:12px;
margin:10px;
font-size:16px;
font-weight:bold;
}

.green{background:#00d084;color:#000}
.yellow{background:#ffb300;color:#000}
.red{background:#ff4d4d;color:#fff}
.blue{background:#4da6ff;color:#000}

.box{
background:#111;
padding:15px;
margin:10px;
border-radius:12px;
text-align:left;
word-break:break-word;
}
</style>
</head>

<body>

<div class="card">

<h2>🚀 Sazio AI Final</h2>

<p id="name"></p>
<p id="email"></p>
<p id="uid"></p>
<p id="clicks"></p>
<p id="earnings"></p>
<p id="streak"></p>

<button class="green" onclick="generateEarning()">Earn 💰</button>
<button class="yellow" onclick="dailyBonus()">Daily Bonus 🎁</button>

<input id="topic" placeholder="Enter your topic" style="width:90%;padding:10px;border-radius:10px;border:none">

<button onclick="generateAI()">Generate AI 🤖</button>

<div class="box" id="output"></div>

<h3>Referral</h3>
<div class="box" id="ref"></div>

<button class="blue" onclick="copyLink()">Copy Link 🔗</button>

<h3>Share & Earn</h3>
<button onclick="share()">Share Now 🚀</button>

<div id="adminPanel" class="box"></div>

<button onclick="logout()">Logout</button>

</div>

<script type="module">

import { auth, db } from "./firebase-config.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, getDoc, updateDoc, increment, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let user;

function set(id,val){
document.getElementById(id).innerText=val;
}

onAuthStateChanged(auth, async(u)=>{
if(!u){
window.location.href="./";
return;
}

user=u;

const refDoc=doc(db,"users",u.uid);
const snap=await getDoc(refDoc);
const data=snap.data();

set("name","Name: "+data.name);
set("email","Email: "+data.email);
set("uid","UID: "+u.uid);
set("clicks","Clicks: "+data.clicks);
set("earnings","Earnings: "+data.earnings);
set("streak","Streak: "+(data.streak||0));

const link=window.location.origin + "/dashboard.html?ref="+u.uid+"&v="+Date.now();
set("ref",link);

const params=new URLSearchParams(window.location.search);
const refId=params.get("ref");

if(refId && refId!==u.uid){
await updateDoc(doc(db,"users",refId),{
clicks:increment(1),
earnings:increment(10)
});
}

loadAdmin();

});

window.generateEarning=async()=>{
await updateDoc(doc(db,"users",user.uid),{
clicks:increment(1),
earnings:increment(5)
});
location.reload();
}

window.dailyBonus=async()=>{
await updateDoc(doc(db,"users",user.uid),{
earnings:increment(20),
streak:increment(1)
});
location.reload();
}

window.generateAI=()=>{
const topic=document.getElementById("topic").value;
document.getElementById("output").innerText=
"🔥 Viral Script for "+topic+"\nHook\nScene\nTwist\nEnding";
}

window.copyLink=()=>{
navigator.clipboard.writeText(document.getElementById("ref").innerText);
alert("Copied");
}

window.share=()=>{
navigator.share({
title:"Earn from AI",
text:"Use this AI and earn 💰",
url:document.getElementById("ref").innerText
});
}

window.logout=()=>{
signOut(auth);
}

async function loadAdmin(){

const adminEmail="test123@gmail.com";

if(user.email!==adminEmail) return;

const query=await getDocs(collection(db,"users"));

let totalUsers=0;
let totalEarnings=0;

query.forEach(doc=>{
totalUsers++;
totalEarnings+=doc.data().earnings||0;
});

document.getElementById("adminPanel").innerText=
"ADMIN PANEL\nUsers: "+totalUsers+"\nTotal Earnings: "+totalEarnings;

}

</script>

</body>
</html>
