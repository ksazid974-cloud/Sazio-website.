<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAZIO Dashboard</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#000;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }
    .card{
      width:320px;
      background:#111;
      padding:25px;
      border-radius:20px;
      text-align:center;
    }
    h1{font-size:26px}
    p{margin:10px 0;word-break:break-word}

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-top:10px;
      cursor:pointer;
      font-size:16px;
    }

    .earn{background:#00ff99;color:#000}
    .logout{background:#eee;color:#111}
  </style>
</head>

<body>

<div class="card">
  <h1 id="welcome">Loading...</h1>

  <p id="name"></p>
  <p id="email"></p>
  <p id="uid"></p>
  <p id="clicks"></p>
  <p id="earnings"></p>

  <button class="earn" onclick="generateEarning()">Generate Earning 💰</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<script type="module">
import { auth, db } from "./firebase-config.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let currentUser = null;

function fill(user,data){
  document.getElementById("welcome").innerText =
    "Welcome " + (data.name || "Sazio") + " 🚀";

  document.getElementById("name").innerText =
    "Name: " + (data.name || "Sazio");

  document.getElementById("email").innerText =
    "Email: " + user.email;

  document.getElementById("uid").innerText =
    "UID: " + user.uid;

  document.getElementById("clicks").innerText =
    "Clicks: " + (data.clicks || 0);

  document.getElementById("earnings").innerText =
    "Earnings: " + (data.earnings || 0);
}

onAuthStateChanged(auth, async (user)=>{
  if(user){
    currentUser = user;

    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);

    if(snap.exists()){
      fill(user,snap.data());
    }

  }else{
    window.location.href="./index.html";
  }
});

window.generateEarning = async ()=>{
  const ref = doc(db,"users",currentUser.uid);

  await updateDoc(ref,{
    clicks: increment(1),
    earnings: increment(10)
  });

  const snap = await getDoc(ref);
  fill(currentUser,snap.data());
};

window.logout = async ()=>{
  await signOut(auth);
  window.location.href="./index.html";
};
</script>

</body>
</html>
